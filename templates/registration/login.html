{% extends 'base.html' %}

{% block title %}Sign In - The Book Merchant{% endblock %}

{% block content %}

<!-- ----- LOGIN PAGE ----- -->
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-5">

            <!-- ----- login card ----- -->
            <div class="form-card">

                <!-- title -->
                <h2 class="section-title">Sign In</h2>
                <p class="text-muted mb-4">Welcome back to The Book Merchant</p>

                <!-- ----- login form ----- -->
                <!-- method POST sends data securely -->
                <!-- csrf_token protects against attacks -->
                <form method="POST" action="/login/">
                    {% csrf_token %}

                    <!-- username field -->
                    <div class="mb-3">
                        <label for="username" class="form-label">Username</label>
                        <input type="text"
                               class="form-control"
                               id="username"
                               name="username"
                               maxlength="150"
                               placeholder="Enter your username"
                               required
                               aria-label="Username">
                    </div>

                    <!-- password field -->
                    <div class="mb-3">
                        <label for="password" class="form-label">Password</label>
                        <input type="password"
                               class="form-control"
                               id="password"
                               name="password"
                               maxlength="128"
                               placeholder="Enter your password"
                               required
                               aria-label="Password">
                    </div>

                    <!-- submit button -->
                    <button type="submit"
                            class="btn btn-merchant w-100 mt-2"
                            aria-label="Sign in to your account">
                        Sign In
                    </button>

                </form>
                <!-- end login form -->

                <!-- link to register page -->
                <p class="text-center mt-3 text-muted">
                    Don't have an account?
                    <a href="/register/">Register here</a>
                </p>

            </div>
            <!-- end login card -->

        </div>
    </div>
</div>

{% endblock %}
